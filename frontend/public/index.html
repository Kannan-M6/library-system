<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>📚 Library Management System — Smart, Modern & Beautiful</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        overflow-x: hidden;
      }

      /* Night sky background with gradient */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 25%, #2d1b4e 50%, #1e2d4a 75%, #0f172a 100%);
        pointer-events: none;
        z-index: -2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
