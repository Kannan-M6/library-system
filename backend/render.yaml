services:
  - type: web
    name: libraryiq-backend
    runtime: python
    buildCommand: apt-get install -y libzbar0 && pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app-name.netlify.app
    plan: free
